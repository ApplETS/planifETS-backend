services:
  nestjs-app:
    build:
      context: .
      target: production
    ports:
      - "${PORT:-3501}:${PORT:-3001}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: production
      PORT: ${PORT:-3001}
      LOG_LEVELS: ${LOG_LEVELS:-log,error,warn}
      TZ: America/Toronto
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-10000}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_PRIMARY_MODEL: ${GROQ_PRIMARY_MODEL:-llama-3.3-70b-versatile}
      GROQ_FALLBACK_MODEL: ${GROQ_FALLBACK_MODEL:-llama-3.1-8b-instant}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-3.3-70b-instruct}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:${PORT:-3001}/api/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nestjs-app-dev:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3501}:${PORT:-3001}"
    volumes:
      - .:/app
      - /app/node_modules
      - transformers-cache:/app/.cache/transformers
    env_file:
      - .env
    environment:
      APP_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
      FORCE_POLLING: "true"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - app-network
    profiles:
      - dev

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Toronto
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - app-network
    profiles:
      - dev

volumes:
  db-data:
    driver: local
  qdrant-data:
    driver: local
  transformers-cache:
    driver: local

networks:
  app-network:
    driver: bridge
