services:
  nestjs-app:
    build:
      context: .
      target: production
    ports:
      - "${HOST_PORT:-3501}:${PORT:-3001}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: production
      PORT: ${PORT:-3001}
      LOG_LEVELS: ${LOG_LEVELS:-log,error,warn}
      TZ: America/Toronto
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:${PORT:-3001}/api/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nestjs-app-dev:
    build:
      context: .
      target: dev
    ports:
      - "${HOST_PORT:-3501}:${PORT:-3001}"
    volumes:
      - .:/app
      - /app/node_modules
      - transformers-cache:/app/.cache/transformers
    mem_limit: 4g
    memswap_limit: 4g
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: development
      PORT: ${PORT:-3001}
      LOG_LEVELS: ${LOG_LEVELS:-log,error,warn}
      TZ: America/Toronto
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-courses_bge_m3}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Xenova/bge-m3}
      EMBEDDING_DTYPE: ${EMBEDDING_DTYPE:-q4}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-50}
      TRANSFORMERS_CACHE_DIR: ${TRANSFORMERS_CACHE_DIR:-/app/.cache/transformers}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
      FORCE_POLLING: "true"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - app-network
    profiles:
      - dev

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Toronto
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - app-network
    profiles:
      - dev

volumes:
  db-data:
    driver: local
  qdrant-data:
    driver: local
  transformers-cache:
    driver: local

networks:
  app-network:
    driver: bridge
